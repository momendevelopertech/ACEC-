<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Icon - Gold (#c9a84c) for prominence -->
  <g fill="#e8c97a">
    <rect x="10" y="20" width="15" height="15" rx="2"/>
    <rect x="27" y="20" width="15" height="15" rx="2"/>
    <rect x="44" y="20" width="15" height="15" rx="2"/>
    <rect x="10" y="37" width="15" height="15" rx="2"/>
    <rect x="27" y="37" width="15" height="15" rx="2"/>
    <rect x="10" y="54" width="15" height="15" rx="2"/>
  </g>

  <!-- Text ACEC - White for contrast on dark background -->
  <text x="70" y="60" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="900" fill="#f5f5f0" letter-spacing="2">
    ACEC
  </text>

  <!-- Arabic - Light gold for secondary importance -->
  <text x="70" y="85" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#e8c97a">
    الميثاق العربي للاستشارات الهندسية وهندسة السلامة
  </text>

  <!-- English - Muted white for tertiary content -->
  <text x="70" y="100" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#d4d4cc" opacity="0.9">
    By Eng. Majid Al Thubaity
  </text>
</svg>